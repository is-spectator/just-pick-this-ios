name: JustPickThisIOS
options:
  bundleIdPrefix: com.justpickthis
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
targets:
  JustPickThisIOS:
    type: application
    platform: iOS
    sources:
      - NativeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.justpickthis.ios
        PRODUCT_NAME: "就选这个"
        INFOPLIST_FILE: NativeApp/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
